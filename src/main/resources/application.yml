spring:
  application:
    name: soptcha

  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3306/soptcha?useSSL=false&serverTimezone=Asia/Seoul
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true